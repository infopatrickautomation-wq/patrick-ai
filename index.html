
<!DOCTYPE html>
<html lang="it" style="scroll-behavior: smooth;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patrick-AI | Automazione e Ottimizzazione Processi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,500;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #EDEAE3;
        color: #1C1C1C;
        overflow-x: hidden;
        cursor: auto;
      }

      a, button, input, textarea, [role="button"] {
        cursor: pointer;
      }

      .font-montserrat {
        font-family: 'Inter', sans-serif;
      }

      .gradient-text {
        color: #2A5C3F;
      }

      .accent-italic {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 700;
        letter-spacing: -2.88px;
        line-height: 105.6px;
        color: #2A5C3F;
        -webkit-text-fill-color: unset;
        background: none;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #E4E0D8;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A5C3F;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3D7055;
      }
      @keyframes sphere-float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-15px) rotate(5deg); }
        50% { transform: translateY(-5px) rotate(-3deg); }
        75% { transform: translateY(-20px) rotate(3deg); }
      }
      .animate-sphere-float {
        animation: sphere-float 8s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.1); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 3s ease-in-out infinite;
      }
      /* Simple fadeIn for scroll animations */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s ease-out;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Effetto Evidenziatore Personalizzato */
      .marker-underline {
        text-decoration: underline;
        text-decoration-color: #2A5C3F;
        text-decoration-thickness: 12px;
        text-underline-offset: 2px;
        text-decoration-skip-ink: none;
      }

      /* ── Card global effect ── */
      .neon-card {
        border-width: 2.5px !important;
        border-color: rgba(42,92,63,0.55) !important;
        box-shadow: 0 0 12px rgba(42,92,63,0.12), 0 2px 16px rgba(0,0,0,0.06) !important;
      }
      .neon-card:hover {
        border-color: #2A5C3F !important;
        box-shadow: 0 0 22px rgba(42,92,63,0.28), 0 4px 24px rgba(0,0,0,0.08) !important;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
